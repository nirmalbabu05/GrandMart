<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrandMart ERP - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bg-mesh {
            background-color: #f0fdf4;
            background-image: 
                radial-gradient(at 0% 0%, rgb(30, 58, 138) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(280,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body class="bg-mesh h-screen flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md rounded-3xl p-8 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500"></div>
        
        <div class="text-center mb-8 mt-4">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center text-white shadow-lg mb-4 transform rotate-12">
                <i class="fas fa-shopping-basket text-3xl transform -rotate-12"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-800 tracking-tight">GrandMart ERP</h1>
            <p class="text-gray-500 text-sm font-semibold mt-1">Authorized Personnel Only</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-r-lg font-bold flex items-center text-sm shadow-sm">
            <i class="fas fa-exclamation-circle text-lg mr-2"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="mb-5">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="text" name="username" required autofocus placeholder="Enter your ID" class="w-full pl-11 p-3 rounded-xl border border-gray-300 outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 font-semibold bg-gray-50 transition-all">
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="password" name="password" required placeholder="••••••••" class="w-full pl-11 p-3 rounded-xl border border-gray-300 outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 font-semibold bg-gray-50 transition-all">
                </div>
            </div>

            <button type="submit" class="w-full bg-gray-800 hover:bg-black text-white font-black py-3.5 rounded-xl transition-all transform hover:-translate-y-1 shadow-lg flex items-center justify-center group">
                Access Terminal <i class="fas fa-arrow-right ml-2 opacity-0 group-hover:opacity-100 transition-opacity transform -translate-x-2 group-hover:translate-x-0"></i>
            </button>
        </form>
        
        <p class="text-center text-xs text-gray-400 mt-8 font-semibold">
            &copy; 2026 GrandMart Superstore. System v1.5.0
        </p>
    </div>

</body>
</html>
