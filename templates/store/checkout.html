<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure 3D Checkout - GrandMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #f0f4ff 0%, #fff0f5 50%, #f3e8ff 100%);
            background-attachment: fixed;
        }
        .glass-3d-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.08);
        }
        .text-glow {
            background: linear-gradient(to right, #f43f5e, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-3d {
            transition: all 0.15s ease;
            box-shadow: 0 6px 0 #1e40af, 0 10px 15px rgba(0,0,0,0.15);
        }
        .btn-3d:active {
            box-shadow: 0 0 0 #1e40af, 0 2px 4px rgba(0,0,0,0.15);
            transform: translateY(6px);
        }
        .float-anim { animation: floating 4s ease-in-out infinite; }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        /* 🌟 New Tracker Line Animation 🌟 */
        .track-line { position: relative; }
        .track-line::before {
            content: ''; position: absolute; left: 15px; top: 30px; bottom: -20px;
            width: 2px; background: #e2e8f0; z-index: 0;
        }
        .track-step:last-child .track-line::before { display: none; }
        .pulse-dot { animation: pulseDot 2s infinite; }
        @keyframes pulseDot {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans overflow-x-hidden">

    <nav class="bg-white/70 backdrop-blur-xl border-b border-white/50 py-5 px-6 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <div class="flex items-center cursor-pointer transform transition hover:scale-105" onclick="window.location.href='/'">
            <div class="w-9 h-9 bg-gray-100 hover:bg-purple-100 text-gray-700 hover:text-purple-600 rounded-xl flex items-center justify-center mr-4 transition-colors">
                <i class="fas fa-arrow-left text-sm"></i>
            </div>
            <h1 class="text-xl font-black text-gray-900 tracking-tight">Secure <span class="text-glow">Checkout</span></h1>
        </div>
        <div class="flex items-center space-x-2 text-emerald-500 font-black text-sm bg-emerald-50 px-3 py-1.5 rounded-xl border border-emerald-100 shadow-sm">
            <i class="fas fa-shield-alt text-base"></i> <span>256-Bit SSL Protection</span>
        </div>
    </nav>

    <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8 lg:py-12">
        <div class="flex flex-col lg:flex-row gap-8 lg:gap-12">
            
            <div class="flex-1">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="w-8 h-8 bg-purple-600 text-white rounded-lg flex items-center justify-center font-black shadow-md shadow-purple-500/20">1</div>
                    <h2 class="text-2xl font-black text-gray-800 tracking-tight">Delivery Address 🚚</h2>
                </div>
                
                <div class="glass-3d-card rounded-[2rem] p-6 md:p-8 relative overflow-hidden shadow-2xl">
                    <div class="absolute top-0 right-0 w-40 h-40 bg-purple-200 opacity-20 blur-[60px] float-anim"></div>
                    
                    <form id="checkoutForm" class="space-y-6 relative z-10">
                        <div>
                            <label class="block text-xs font-black text-purple-600 uppercase tracking-widest mb-2 pl-1">Full Name</label>
                            <input type="text" id="custName" required placeholder="Enter your full name" class="w-full bg-white/90 border-2 border-gray-100 focus:border-purple-500 focus:ring-4 focus:ring-purple-500/10 rounded-2xl p-4 text-gray-800 font-bold outline-none transition-all shadow-sm">
                        </div>

                        <div>
                            <label class="block text-xs font-black text-purple-600 uppercase tracking-widest mb-2 pl-1">Mobile Number</label>
                            <input type="tel" id="custPhone" required placeholder="10-digit mobile number" class="w-full bg-white/90 border-2 border-gray-100 focus:border-purple-500 focus:ring-4 focus:ring-purple-500/10 rounded-2xl p-4 text-gray-800 font-bold outline-none transition-all shadow-sm">
                        </div>

                        <div>
                            <label class="block text-xs font-black text-purple-600 uppercase tracking-widest mb-2 pl-1">Complete Address</label>
                            <textarea id="custAddress" required placeholder="House No, Street, Landmark, Area..." class="w-full h-32 bg-white/90 border-2 border-gray-100 focus:border-purple-500 focus:ring-4 focus:ring-purple-500/10 rounded-2xl p-4 text-gray-800 font-bold outline-none transition-all shadow-sm resize-none"></textarea>
                        </div>

                        <div class="pt-4 border-t-2 border-dashed border-gray-100">
                            <label class="block text-xs font-black text-purple-600 uppercase tracking-widest mb-3 pl-1">Select Payment Mode</label>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <label class="border-2 border-purple-500 bg-purple-50/50 p-4 rounded-2xl flex items-center cursor-pointer transition shadow-inner">
                                    <input type="radio" name="payment" value="COD" checked class="w-5 h-5 text-purple-600 focus:ring-purple-500">
                                    <div class="ml-3">
                                        <p class="font-black text-purple-900 text-sm">Cash on Delivery</p>
                                        <p class="text-[10px] font-bold text-purple-500 mt-0.5">Pay in cash or UPI at delivery</p>
                                    </div>
                                </label>
                                <label class="border-2 border-gray-200 bg-white/50 p-4 rounded-2xl flex items-center cursor-not-allowed opacity-50">
                                    <input type="radio" name="payment" disabled class="w-5 h-5">
                                    <div class="ml-3">
                                        <p class="font-black text-gray-400 text-sm">Online UPI / Cards</p>
                                        <p class="text-[10px] font-bold text-gray-400 mt-0.5">Coming Soon 🚀</p>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="w-full lg:w-[420px]">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center font-black shadow-md shadow-blue-500/20">2</div>
                    <h2 class="text-2xl font-black text-gray-800 tracking-tight">Summary 📋</h2>
                </div>
                
                <div class="glass-3d-card rounded-[2.5rem] flex flex-col h-[620px] overflow-hidden shadow-2xl relative">
                    <div id="checkoutCartItems" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
                    
                    <div class="bg-gray-900 text-white p-6 rounded-b-[2.5rem] shadow-2xl relative overflow-hidden border-t-2 border-gray-800 shrink-0">
                        <div class="absolute -left-4 -top-4 w-8 h-8 bg-[#f5f3ff] rounded-full z-20"></div>
                        <div class="absolute -right-4 -top-4 w-8 h-8 bg-[#f5f3ff] rounded-full z-20"></div>
                        
                        <div class="space-y-3 mb-6 relative z-10">
                            <div class="flex justify-between text-gray-400 text-sm font-bold">
                                <span>Cart Subtotal</span>
                                <span id="summarySubtotal" class="text-white">₹0.00</span>
                            </div>
                            <div class="flex justify-between text-emerald-400 text-sm font-black">
                                <span>Delivery Charges</span>
                                <span class="bg-emerald-500/10 border border-emerald-500/30 px-2 py-0.5 rounded-md">FREE</span>
                            </div>
                        </div>
                        
                        <div class="border-t-2 border-dashed border-gray-700 my-4"></div>
                        
                        <div class="flex justify-between items-center relative z-10">
                            <span class="text-xs font-black text-gray-400 uppercase tracking-widest">Grand Total</span>
                            <span class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-rose-400 via-purple-400 to-blue-400" id="summaryTotal">₹0.00</span>
                        </div>

                        <button id="placeOrderBtn" onclick="submitOrder()" class="w-full mt-6 bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white text-lg font-black py-4 rounded-2xl shadow-xl btn-3d border-b-4 border-purple-900 flex justify-center items-center tracking-wide">
                            <i class="fas fa-check-circle mr-2 text-xl drop-shadow-md"></i> CONFIRM ORDER
                        </button>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

    <script>
        let webCart = JSON.parse(localStorage.getItem('grandmart_cart')) || {};
        
        function renderCheckoutCart() {
            const container = document.getElementById('checkoutCartItems');
            const placeBtn = document.getElementById('placeOrderBtn');
            let total = 0; let html = '';
            
            if(Object.keys(webCart).length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 space-y-4 pt-20"><i class="fas fa-shopping-basket text-6xl text-gray-300 float-anim"></i><p class="font-black text-lg">Your checkout cart is empty!</p></div>`;
                placeBtn.disabled = true; placeBtn.style.filter = 'grayscale(100%) opacity(0.5)'; return;
            }

            for(let id in webCart) {
                let item = webCart[id]; let itemTotal = item.price * item.qty; total += itemTotal;
                let imgTag = item.image !== 'none' ? `<img src="${item.image}" class="w-full h-full object-contain p-1 drop-shadow-sm">` : `<i class="fas fa-cube text-gray-300 text-lg"></i>`;
                
                html += `
                <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                    <div class="w-14 h-14 bg-gray-50 rounded-xl flex items-center justify-center shrink-0 border border-gray-100 overflow-hidden">${imgTag}</div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-black text-gray-800 text-sm line-clamp-1 leading-tight">${item.name}</h4>
                        <p class="text-xs font-bold text-gray-400 mt-1">₹${item.price.toFixed(2)} <span class="text-purple-300 mx-0.5">x</span> ${item.qty}</p>
                    </div>
                    <div class="font-black text-gray-900 text-base shrink-0 tracking-tight">₹${itemTotal.toFixed(2)}</div>
                </div>`;
            }
            
            container.innerHTML = html;
            document.getElementById('summarySubtotal').innerText = `₹${total.toFixed(2)}`;
            document.getElementById('summaryTotal').innerText = `₹${total.toFixed(2)}`;
        }

        function submitOrder() {
            if(Object.keys(webCart).length === 0) return;
            
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const address = document.getElementById('custAddress').value.trim();
            
            if(!name || !phone || !address) { alert("Bro, details ellam complete-aa enter pannunga first! 📝"); return; }

            const btn = document.getElementById('placeOrderBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> PROCESSING...';
            btn.disabled = true;

            const payload = { cart: webCart, customer: { name: name, phone: phone, address: address } };
            const csrf = document.querySelector('[name=csrfmiddlewaretoken]').value;

            fetch('{% url "checkout" %}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    // 🌟 ZEPTO STYLE LIVE TRACKING UI 🌟
                    document.body.innerHTML = `
                    <div class="min-h-screen bg-gray-50 p-4 md:p-8 flex flex-col items-center">
                        <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                            
                            <div class="h-40 bg-gray-200 relative overflow-hidden">
                                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.835434509374!2d144.9537353153162!3d-37.816279742021665!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d4c2b349649%3A0xb6899234e561db11!2sEnvato!5e0!3m2!1sen!2sus!4v1614234567890!5m2!1sen!2sus" width="100%" height="100%" style="border:0; filter: grayscale(0.5) opacity(0.8);" allowfullscreen="" loading="lazy"></iframe>
                                <div class="absolute inset-0 bg-gradient-to-t from-white via-white/20 to-transparent"></div>
                                <div class="absolute bottom-4 left-6 right-6 bg-white/90 backdrop-blur-md px-4 py-2 rounded-xl shadow-sm flex items-center justify-between">
                                    <span class="font-black text-gray-800 text-sm"><i class="fas fa-hashtag text-blue-500 mr-1"></i> ${data.invoice}</span>
                                    <span class="text-xs font-bold bg-green-100 text-green-700 px-2 py-1 rounded-md pulse-dot">LIVE</span>
                                </div>
                            </div>

                            <div class="p-6">
                                <h2 class="text-2xl font-black text-gray-900 mb-1">Arriving in <span class="text-emerald-500">10 Mins</span></h2>
                                <p class="text-sm text-gray-500 font-bold mb-8">Delivery to: ${address.substring(0, 30)}...</p>

                                <div class="space-y-6">
                                    <div class="flex gap-4 track-step track-line">
                                        <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center shrink-0 shadow-md z-10">
                                            <i class="fas fa-check text-xs"></i>
                                        </div>
                                        <div>
                                            <h4 class="font-black text-gray-800 text-sm">Order Placed</h4>
                                            <p class="text-xs text-gray-400 font-bold">We have received your order.</p>
                                        </div>
                                    </div>
                                    <div class="flex gap-4 track-step track-line">
                                        <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-500 border-2 border-blue-500 flex items-center justify-center shrink-0 z-10 pulse-dot">
                                            <i class="fas fa-box text-xs"></i>
                                        </div>
                                        <div>
                                            <h4 class="font-black text-blue-600 text-sm">Packing</h4>
                                            <p class="text-xs text-gray-500 font-bold">Store is preparing your items.</p>
                                        </div>
                                    </div>
                                    <div class="flex gap-4 track-step track-line">
                                        <div class="w-8 h-8 rounded-full bg-gray-100 text-gray-300 border-2 border-gray-200 flex items-center justify-center shrink-0 z-10">
                                            <i class="fas fa-motorcycle text-xs"></i>
                                        </div>
                                        <div>
                                            <h4 class="font-bold text-gray-400 text-sm">Out for Delivery</h4>
                                        </div>
                                    </div>
                                    <div class="flex gap-4 track-step track-line">
                                        <div class="w-8 h-8 rounded-full bg-gray-100 text-gray-300 border-2 border-gray-200 flex items-center justify-center shrink-0 z-10">
                                            <i class="fas fa-home text-xs"></i>
                                        </div>
                                        <div>
                                            <h4 class="font-bold text-gray-400 text-sm">Delivered</h4>
                                        </div>
                                    </div>
                                </div>

                                <div class="mt-8 flex gap-3">
                                    <button onclick="window.location.reload()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-black py-3 rounded-xl transition text-sm">
                                        <i class="fas fa-sync-alt mr-1"></i> Refresh Status
                                    </button>
                                    <button onclick="window.location.href='/'" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl transition shadow-md text-sm">
                                        Home
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                    localStorage.removeItem('grandmart_cart');
                } else {
                    alert(data.message);
                    btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i> CONFIRM ORDER';
                    btn.disabled = false;
                }
            })
            .catch(err => {
                console.error(err); alert("Network error during processing!");
                btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i> CONFIRM ORDER';
                btn.disabled = false;
            });
        }

        renderCheckoutCart();
    </script>
</body>
</html>
